name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    name: Build and test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: ["18", "24"]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.33.1

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build package bundles
        run: pnpm run build:all

      - name: Run tests
        run: pnpm test --runInBand --verbose

      - name: Check package exports
        run: pnpm run test:package

      - name: Check package declarations
        run: pnpm run test:package:types

      - name: Check packed package install
        run: pnpm run test:package:tarball

      - name: Check package contents
        run: pnpm run test:package:pack
