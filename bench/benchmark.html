<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>Lightning Levenshtein Benchmark</title>
  <style>
    body {
      font-family: sans-serif;
      padding: 2rem;
      background: #111;
      color: #0f0;
    }

    h1, h2 {
      font-size: 1.4rem;
      margin-bottom: 0.75rem;
    }

    .controls {
      display: grid;
      grid-template-columns: repeat(4, max-content);
      gap: 0.75rem 1.25rem;
      align-items: center;
      margin-bottom: 1.5rem;
    }

    .controls label {
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    input, select, button {
      font: inherit;
    }

    input[type="number"] {
      width: 6em;
    }

    .result {
      margin: 1rem 0;
      font-family: monospace;
      white-space: pre-wrap;
    }

    .muted {
      color: #8f8;
      opacity: 0.8;
      font-size: 0.95rem;
      margin: 0.5rem 0 1rem;
    }

    .row {
      display: flex;
      gap: 2rem;
      align-items: flex-start;
    }

    .panel-left {
      flex: 2;
    }

    .panel-right {
      flex: 1;
      border-left: 1px solid #333;
      padding-left: 1rem;
    }

    .hidden {
      display: none !important;
    }
  </style>

  <link rel="modulepreload" href="../dist/lightning-levenshtein.min.js">
  <link rel="modulepreload" href="./lightning-levenshtein-v2.min.js">
</head>

<body>
  <h1>Levenshtein Benchmark</h1>

  <div class="controls">
    <label>
      Mode:
      <select id="lengthMode">
        <option value="fixed">Fixed length</option>
        <option value="range">Length range</option>
      </select>
    </label>

    <label id="fixedLenWrap">
      String length:
      <input type="number" id="strlen" value="12" min="1" max="1000" step="1">
    </label>

    <label id="minLenWrap" class="hidden">
      Min length:
      <input type="number" id="minLen" value="2" min="1" max="1000" step="1">
    </label>

    <label id="maxLenWrap" class="hidden">
      Max length:
      <input type="number" id="maxLen" value="15" min="1" max="1000" step="1">
    </label>

    <label>
      Sample pairs:
      <input type="number" id="sampleCount" value="200" min="1" max="100000" step="1">
    </label>

    <label>
      Time / lib (ms):
      <input type="number" id="timeLimit" value="500" min="10" max="10000" step="10">
    </label>

    <label>
      distanceMax cap:
      <input type="number" id="distanceMaxCap" value="10" min="0" max="100000" step="1">
    </label>

    <label>
      Seed:
      <input type="number" id="seed" value="1337" min="0" max="999999999" step="1">
    </label>

    <button id="runBtn">Run Benchmark</button>
  </div>

  <div class="muted" id="datasetInfo">Dataset: pending...</div>

  <div class="row">
    <div class="panel-left">
      <h2>⚡ lightning-Levenshtein</h2>
      <div class="result" id="output">Running...</div>
    </div>

    <div class="panel-right">
      <h2>📦 Other Libraries</h2>
      <pre id="otherOutput">Pending...</pre>
    </div>
  </div>

  <script type="module">
    import { distance, distanceMax, closest } from '../dist/lightning-levenshtein.min.js';
    import { levenshteinLightning } from './lightning-levenshtein-v2.min.js';

    import fastLevenshteinPkg from 'https://esm.sh/fast-levenshtein';
    const { get: fastLevenshtein } = fastLevenshteinPkg;

    import jslevenshtein from 'https://esm.sh/js-levenshtein';
    import leven from 'https://esm.sh/leven';
    import * as led from 'https://esm.sh/levenshtein-edit-distance';
    import { distance as fastestLevenshtein } from 'https://esm.sh/fastest-levenshtein';

    const levenshteinEditDistance = led.levenshteinEditDistance ?? led.default;
    if (typeof levenshteinEditDistance !== 'function') {
      throw new Error('levenshteinEditDistance is not a function');
    }

    const out = document.getElementById('output');
    const otherOutput = document.getElementById('otherOutput');
    const datasetInfo = document.getElementById('datasetInfo');

    const lengthModeEl = document.getElementById('lengthMode');
    const fixedLenWrap = document.getElementById('fixedLenWrap');
    const minLenWrap = document.getElementById('minLenWrap');
    const maxLenWrap = document.getElementById('maxLenWrap');

    const formatNum = n => n.toLocaleString(undefined, { maximumFractionDigits: 2 });

    function mulberry32(seed) {
      let t = seed >>> 0;
      return function () {
        t += 0x6D2B79F5;
        let r = Math.imul(t ^ (t >>> 15), t | 1);
        r ^= r + Math.imul(r ^ (r >>> 7), r | 61);
        return ((r ^ (r >>> 14)) >>> 0) / 4294967296;
      };
    }

    function randInt(rng, min, max) {
      return Math.floor(rng() * (max - min + 1)) + min;
    }

    function asciiString(length, rng) {
      const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789";
      let s = "";
      for (let i = 0; i < length; i++) {
        s += chars[(rng() * chars.length) | 0];
      }
      return s;
    }

    function generateSamples(config) {
      const rng = mulberry32(config.seed);
      const samples = [];

      let minObserved = Infinity;
      let maxObserved = -Infinity;
      let totalLenA = 0;
      let totalLenB = 0;

      for (let i = 0; i < config.sampleCount; i++) {
        let lenA, lenB;

        if (config.mode === 'fixed') {
          lenA = config.fixedLength;
          lenB = config.fixedLength;
        } else {
          lenA = randInt(rng, config.minLength, config.maxLength);
          lenB = randInt(rng, config.minLength, config.maxLength);
        }

        const a = asciiString(lenA, rng);
        const b = asciiString(lenB, rng);
        samples.push([a, b]);

        minObserved = Math.min(minObserved, lenA, lenB);
        maxObserved = Math.max(maxObserved, lenA, lenB);
        totalLenA += lenA;
        totalLenB += lenB;
      }

      return {
        samples,
        summary: {
          count: samples.length,
          minObserved,
          maxObserved,
          avgLenA: totalLenA / samples.length,
          avgLenB: totalLenB / samples.length
        }
      };
    }

    async function benchmark(fn, label, samples, timeLimit = 500) {
      let total = 0;
      let calls = 0;
      const start = performance.now();

      while (performance.now() - start < timeLimit) {
        for (const [a, b] of samples) {
          total += fn(a, b);
          calls++;
        }
      }

      const elapsed = performance.now() - start;
      const opsPerMs = calls / elapsed;
      const ops = opsPerMs >= 1
        ? Math.round(opsPerMs)
        : Number(opsPerMs.toFixed(3));

      return { label, ops, time: elapsed, total, calls };
    }

    function readConfig() {
      const mode = lengthModeEl.value;
      const fixedLength = parseInt(document.getElementById('strlen').value, 10);
      const minLength = parseInt(document.getElementById('minLen').value, 10);
      const maxLength = parseInt(document.getElementById('maxLen').value, 10);
      const sampleCount = parseInt(document.getElementById('sampleCount').value, 10);
      const timeLimit = parseInt(document.getElementById('timeLimit').value, 10);
      const distanceMaxCap = parseInt(document.getElementById('distanceMaxCap').value, 10);
      const seed = parseInt(document.getElementById('seed').value, 10);

      if (!Number.isFinite(sampleCount) || sampleCount < 1) {
        throw new Error('Sample pairs must be >= 1');
      }
      if (!Number.isFinite(timeLimit) || timeLimit < 1) {
        throw new Error('Time per lib must be >= 1');
      }

      if (mode === 'fixed') {
        if (!Number.isFinite(fixedLength) || fixedLength < 1) {
          throw new Error('Fixed string length must be >= 1');
        }
      } else {
        if (!Number.isFinite(minLength) || minLength < 1) {
          throw new Error('Min length must be >= 1');
        }
        if (!Number.isFinite(maxLength) || maxLength < minLength) {
          throw new Error('Max length must be >= min length');
        }
      }

      return {
        mode,
        fixedLength,
        minLength,
        maxLength,
        sampleCount,
        timeLimit,
        distanceMaxCap,
        seed
      };
    }

    function renderDatasetInfo(config, summary) {
      const modeText = config.mode === 'fixed'
        ? `fixed length ${config.fixedLength}`
        : `range ${config.minLength}-${config.maxLength}`;

      datasetInfo.textContent =
        `Dataset: ${summary.count} pairs | mode: ${modeText} | observed lengths: ${summary.minObserved}-${summary.maxObserved} | avg A: ${formatNum(summary.avgLenA)} | avg B: ${formatNum(summary.avgLenB)} | seed: ${config.seed}`;
    }

    function formatResults(results) {
      return results.map(r =>
        `${r.label}\n  → ${formatNum(r.ops)} ops/ms  (Time: ${formatNum(r.time)}ms, Calls: ${formatNum(r.calls)})`
      ).join('\n\n');
    }

    function toggleModeUI() {
      const mode = lengthModeEl.value;
      const isFixed = mode === 'fixed';

      fixedLenWrap.classList.toggle('hidden', !isFixed);
      minLenWrap.classList.toggle('hidden', isFixed);
      maxLenWrap.classList.toggle('hidden', isFixed);
    }

    async function runOtherBenchmarks(samples, timeLimit = 500) {
      const results = [];

      results.push(await benchmark(levenshteinLightning, 'levenshteinLightning-v2', samples, timeLimit));
      results.push(await benchmark(fastestLevenshtein, 'fastest-levenshtein', samples, timeLimit));
      results.push(await benchmark(fastLevenshtein, 'fast-levenshtein', samples, timeLimit));
      results.push(await benchmark(jslevenshtein, 'js-levenshtein', samples, timeLimit));
      results.push(await benchmark(leven, 'leven', samples, timeLimit));
      results.push(await benchmark(levenshteinEditDistance, 'levenshtein-edit-distance', samples, timeLimit));

      results.sort((a, b) => b.ops - a.ops);
      otherOutput.textContent = formatResults(results);
    }

    async function runBenchmarks() {
      const runBtn = document.getElementById('runBtn');

      try {
        const config = readConfig();

        runBtn.textContent = 'RUNNING...';
        runBtn.disabled = true;
        out.textContent = 'Running...';
        otherOutput.textContent = 'Pending...';
        datasetInfo.textContent = 'Generating dataset...';

        await new Promise(requestAnimationFrame);
        await new Promise(requestAnimationFrame);
        await new Promise(requestAnimationFrame);

        // Generate ONE shared dataset and reuse it for every benchmark in this run.
        const { samples, summary } = generateSamples(config);
        renderDatasetInfo(config, summary);

        await runOtherBenchmarks(samples, config.timeLimit);

        const lightningResults = [];
        lightningResults.push(await benchmark(distance, 'lightningLevenshtein: distance()', samples, config.timeLimit));
        lightningResults.push(await benchmark(
          (a, b) => distanceMax(a, b, config.distanceMaxCap),
          `lightningLevenshtein: distanceMax(a, b, ${config.distanceMaxCap})`,
          samples,
          config.timeLimit
        ));
        lightningResults.push(await benchmark(
          (a, b) => { closest(a, [b]); return 0; },
          'lightningLevenshtein: closest()',
          samples,
          config.timeLimit
        ));

        lightningResults.sort((a, b) => b.ops - a.ops);
        out.textContent = formatResults(lightningResults);
      } catch (err) {
        out.textContent = `Error: ${err.message}`;
        otherOutput.textContent = 'Aborted.';
        datasetInfo.textContent = 'Dataset: invalid config';
        console.error(err);
      } finally {
        runBtn.disabled = false;
        runBtn.textContent = 'Run Benchmark';
      }
    }

    lengthModeEl.addEventListener('change', toggleModeUI);
    document.getElementById('runBtn').addEventListener('click', runBenchmarks);

    toggleModeUI();
    runBenchmarks();
  </script>
</body>

</html>
